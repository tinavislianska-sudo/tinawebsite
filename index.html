<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kristina Vislianska | AI Product Marketing &amp; Growth Systems Lead</title>
  <meta name="description" content="Portfolio of Kristina Vislianska, an AI product marketing and growth systems lead building customer intelligence, GEO, content, and automation systems for B2B SaaS and AI companies.">
  <meta property="og:title" content="Kristina Vislianska | AI Product Marketing &amp; Growth Systems Lead">
  <meta property="og:description" content="Portfolio of Kristina Vislianska, an AI product marketing and growth systems lead building customer intelligence, GEO, content, and automation systems for B2B SaaS and AI companies.">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Kristina Vislianska",
    "jobTitle": "AI Product Marketing & Growth Systems Lead",
    "url": "https://kristinavislianska.com/",
    "sameAs": ["https://www.linkedin.com/in/kristinavislianska"],
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Lisbon",
      "addressCountry": "Portugal"
    }
  }
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --sidebar-bg: #f5f5f0;
      --sidebar-border: #dcdcdc;
      --text: #1c1c1e;
      --text-2: #3a3a3c;
      --muted: #8e8e93;
      --accent: #007aff;
      --active-bg: #007aff;
      --active-text: #ffffff;
      --hover-bg: rgba(0,0,0,0.05);
      --divider: #e5e5ea;
      --group-label: #8e8e93;
      --tag-bg: rgba(0,122,255,0.1);
      --tag-text: #007aff;
    }
    [data-theme="dark"] {
      --bg: #1c1c1e;
      --sidebar-bg: #2c2c2e;
      --sidebar-border: #3a3a3c;
      --text: #f2f2f7;
      --text-2: #aeaeb2;
      --muted: #636366;
      --accent: #0a84ff;
      --active-bg: #0a84ff;
      --hover-bg: rgba(255,255,255,0.06);
      --divider: #38383a;
      --group-label: #636366;
      --tag-bg: rgba(10,132,255,0.18);
      --tag-text: #0a84ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 300px;
      min-width: 300px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--divider) transparent;
    }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-track { background: transparent; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

    .group-label {
      padding: 14px 20px 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--group-label);
      text-transform: uppercase;
      letter-spacing: 0.055em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .group-ic { display: flex; align-items: center; }
    .group-ic svg { width: 12px; height: 12px; stroke: var(--group-label); }

    .note-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px 9px 16px;
      margin: 1px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .note-item:hover { background: var(--hover-bg); }
    .note-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .note-item.active { background: var(--active-bg); }

    .note-emoji {
      flex-shrink: 0;
      width: 28px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .note-emoji svg {
      width: 19px;
      height: 19px;
      stroke: var(--muted);
      transition: stroke 0.12s;
    }
    .note-item.active .note-emoji svg { stroke: rgba(255,255,255,0.9); }

    .note-body { flex: 1; min-width: 0; }

    .note-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .note-meta-line {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 3px;
    }
    .note-date {
      font-size: 11.5px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .note-preview {
      font-size: 11.5px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-folder {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .folder-ic { width: 11px; height: 11px; flex-shrink: 0; }

    .note-item.active .note-title,
    .note-item.active .note-date,
    .note-item.active .note-preview,
    .note-item.active .note-folder { color: rgba(255,255,255,0.9); }

    .sidebar-footer {
      border-top: 1px solid var(--sidebar-border);
      padding: 10px 20px;
    }
    .dark-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 0;
      margin-top: 10px;
      transition: color 0.15s;
    }
    .dark-btn:hover { color: var(--text); }
    .btn-ic { display: inline-flex; align-items: center; }
    .btn-ic svg { width: 14px; height: 14px; }

    .contact-btn {
      width: 100%;
      padding: 9px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .contact-btn:hover { opacity: 0.85; }

    .summary-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px 12px;
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--sidebar-border);
      border-radius: 8px;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, background 0.15s;
    }
    .summary-btn:hover { background: var(--hover-bg); }
    /* ═══ CONTENT ═══ */
    .content {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      position: relative;
    }

    .content-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      text-align: right;
      padding: 18px 32px 0;
      font-size: 12px;
      color: var(--muted);
      z-index: 10;
    }

    .content-body {
      padding: 32px 56px 80px;
      max-width: 760px;
    }

    /* ═══ NOTE CONTENT STYLES ═══ */
    #note-content h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.15;
    }

    #note-content p {
      font-size: 15px;
      line-height: 1.72;
      color: var(--text-2);
      margin-bottom: 14px;
    }

    #note-content strong { color: var(--text); font-weight: 600; }

    #note-content hr {
      border: none;
      border-top: 1px solid var(--divider);
      margin: 24px 0;
    }

    #note-content ul { list-style: none; margin-bottom: 12px; }
    #note-content ul li {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-2);
      padding-left: 18px;
      position: relative;
      margin-bottom: 7px;
    }
    #note-content ul li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 7.5px;
      top: 5px;
    }

    .case-h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      margin: 24px 0 10px;
    }

    /* CTA buttons */
    .cta-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    .cta-btn.primary { background: var(--accent); color: #fff; }
    .cta-btn.primary:hover { opacity: 0.85; }
    .cta-btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--sidebar-border); }
    .cta-btn.secondary:hover { background: var(--hover-bg); }

    .case-gallery {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }
    .case-gallery img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--divider);
      display: block;
    }

    .job-role {
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .job-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .evidence-block {
      border: 1px solid var(--divider);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .evidence-block summary {
      cursor: pointer;
      padding: 14px 18px;
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--sidebar-bg);
    }
    .evidence-block summary::-webkit-details-marker { display: none; }
    .evidence-block summary::after {
      content: '+';
      font-size: 18px;
      color: var(--muted);
      font-weight: 400;
    }
    .evidence-block[open] summary::after { content: '−'; }
    .evidence-block summary .ev-sub { font-size: 12.5px; font-weight: 400; color: var(--muted); margin-left: 8px; }
    .evidence-body { padding: 18px; }
    .evidence-body p:last-child, .evidence-body ul:last-child, .evidence-body .tag-row:last-child { margin-bottom: 0; }

    /* Challenge / Solution / Result compact cards */
    .pdr-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--divider);
      border: 1px solid var(--divider);
      border-radius: 12px;
      overflow: hidden;
      margin: 4px 0 22px;
    }
    .pdr-card { background: var(--bg); padding: 14px 16px; }
    .pdr-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .pdr-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    @media (max-width: 680px) {
      .pdr-grid { grid-template-columns: 1fr; }
    }

    .case-summary {
      font-size: 17px;
      color: var(--text-2);
      line-height: 1.5;
      margin: -8px 0 18px;
    }
    .tools-line { font-size: 13px; color: var(--muted); }
    .tools-line strong { color: var(--text-2); font-weight: 600; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin: 4px 0;
    }
    .stat { padding: 16px 0; }
    .stat-num {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-lbl { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* Tags */
    .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 12.5px;
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Skills */
    .skill-group { margin-bottom: 22px; }
    .skill-group-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .positioning-block {
      text-align: center;
      padding: 28px 20px;
      margin-bottom: 28px;
      background: var(--tag-bg);
      border-radius: 16px;
    }
    .positioning-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .positioning-sub {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .rbs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .rbs-card {
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-border);
      border-radius: 12px;
      padding: 16px;
    }
    .rbs-emoji { font-size: 20px; margin-bottom: 6px; }
    .rbs-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .rbs-items { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

    @media (max-width: 680px) {
      .rbs-grid { grid-template-columns: 1fr; }
    }

    /* Education */
    .edu-entry { margin-bottom: 4px; }
    .edu-inst { font-size: 15px; font-weight: 600; color: var(--text); }
    .edu-deg { font-size: 14px; color: var(--text-2); margin-top: 1px; }
    .edu-year { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Contact */
    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 18px;
    }
    .contact-lbl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      width: 88px;
      flex-shrink: 0;
    }
    .contact-val { font-size: 15px; color: var(--text-2); }
    .contact-val a { color: var(--accent); text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }

    /* ═══ MOBILE OVERLAY ═══ */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }
    .sidebar-overlay.open { display: block; }

    .mob-menu {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 200;
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-border);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-family: inherit;
      align-items: center;
      gap: 7px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    @media (max-width: 680px) {
      .mob-menu { display: flex; }

      .sidebar {
        position: fixed;
        left: -100%;
        width: 85vw;
        max-width: 320px;
        transition: left 0.25s ease;
        z-index: 100;
        box-shadow: 4px 0 24px rgba(0,0,0,0.12);
      }
      .sidebar.open { left: 0; }

      .content-body {
        padding: 72px 20px 80px;
        max-width: 100%;
      }

      .content-header {
        padding: 18px 20px 0 64px;
        font-size: 11px;
      }

      #note-content h1 {
        font-size: 22px;
      }

      .job-role { font-size: 14px; }
      .job-meta { font-size: 12px; }

      #note-content p,
      #note-content ul li {
        font-size: 14px;
      }

      .contact-row { flex-direction: column; gap: 3px; }
      .contact-lbl { width: auto; }

      .stats-grid { grid-template-columns: repeat(2, 1fr); }

      .summary-btn { font-size: 12px; padding: 8px 10px; }
      .cta-row { flex-direction: column; }
      .cta-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<button class="mob-menu" onclick="toggleSidebar()">☰ Menu</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="notes-list" id="notes-list"></div>
    <div class="sidebar-footer">
      <button class="contact-btn" onclick="goToContact()"><span class="btn-ic" id="mail-icon"></span> Work with me</button>

        <span class="btn-ic" id="dark-icon"></span>
        <span id="dark-label">Dark</span>
      </button>
    </div>
  </aside>

  <!-- ═══ CONTENT ═══ -->
  <main class="content">
    <div class="content-header" id="content-header"></div>
    <div class="content-body">
      <div id="note-content"></div>
    </div>
  </main>

</div>

// ═══ GROUPS ═══
const groups = [
  { label: 'Pinned', icon: 'pin', filter: n => n.pinned },
  { label: 'Selected Product Work', filter: n => n.group === 'cases' && n.subgroup === 'selected' },
  { label: 'Previous Work', filter: n => n.group === 'cases' && n.subgroup === 'previous' },
  { label: 'More', filter: n => n.bottom },
];

// ═══ STATE ═══
let activeId = 'about';
let dark = false;

// ═══ RENDER ═══
function renderSidebar() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  groups.forEach(g => {
    const items = notes.filter(g.filter);
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.innerHTML = (g.icon ? `<span class="group-ic">${ICONS[g.icon]}</span>` : '') + g.label;
    list.appendChild(lbl);
    items.forEach(n => list.appendChild(makeItem(n)));
  });
}

function makeItem(note) {
  const el = document.createElement('div');
  el.className = 'note-item' + (note.id === activeId ? ' active' : '');
  el.dataset.id = note.id;
  el.setAttribute('role', 'button');
  el.setAttribute('tabindex', '0');
  el.setAttribute('aria-current', note.id === activeId ? 'true' : 'false');
  el.innerHTML = `
    <div class="note-emoji">${ICONS[note.icon] || ''}</div>
    <div class="note-body">
      <div class="note-title">${note.title}</div>
      <div class="note-meta-line">
        <span class="note-date">${note.date}</span>
        <span class="note-preview">${note.preview}</span>
      </div>
      <div class="note-folder"><svg class="folder-ic" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 5.5A1.5 1.5 0 014 4h3.5l1.5 2H16a1.5 1.5 0 011.5 1.5v6A1.5 1.5 0 0116 15H4a1.5 1.5 0 01-1.5-1.5v-8z"/></svg> ${note.folder}</div>
    </div>`;
  el.addEventListener('click', () => selectNote(note.id));
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      selectNote(note.id);
    }
  });
  return el;
}

function selectNote(id) {
  activeId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  document.querySelectorAll('.note-item').forEach(el => {
    const isActive = el.dataset.id === id;
    el.classList.toggle('active', isActive);
    el.setAttribute('aria-current', isActive ? 'true' : 'false');
  });
  document.getElementById('note-content').innerHTML = note.render();
  document.getElementById('content-header').textContent = note.header;
  document.querySelector('.content').scrollTop = 0;
  history.replaceState(null, '', '#' + id);
  // close mobile sidebar
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function toggleDark() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('dark-icon').innerHTML = ICONS[dark ? 'sun' : 'moon'];
  document.getElementById('dark-label').textContent = dark ? 'Light' : 'Dark';
}

function goToContact() {
  selectNote('about');
  requestAnimationFrame(() => {
    const el = document.getElementById('contact');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

document.getElementById('dark-icon').innerHTML = ICONS.moon;
document.getElementById('mail-icon').innerHTML = ICONS.contact;
renderSidebar();
const initialId = notes.some(n => n.id === location.hash.slice(1)) ? location.hash.slice(1) : 'about';
selectNote(initialId);
window.addEventListener('hashchange', () => {
  const id = location.hash.slice(1);
  if (notes.some(n => n.id === id) && id !== activeId) selectNote(id);
});
