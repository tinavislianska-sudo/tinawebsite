<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tina Vislianska</title>
  <style>
    :root {
      --bg: #ffffff;
      --sidebar-bg: #f5f5f0;
      --sidebar-border: #dcdcdc;
      --text: #1c1c1e;
      --text-2: #3a3a3c;
      --muted: #8e8e93;
      --accent: #007aff;
      --active-bg: #007aff;
      --active-text: #ffffff;
      --hover-bg: rgba(0,0,0,0.05);
      --divider: #e5e5ea;
      --group-label: #8e8e93;
      --tag-bg: rgba(0,122,255,0.1);
      --tag-text: #007aff;
    }
    [data-theme="dark"] {
      --bg: #1c1c1e;
      --sidebar-bg: #2c2c2e;
      --sidebar-border: #3a3a3c;
      --text: #f2f2f7;
      --text-2: #aeaeb2;
      --muted: #636366;
      --accent: #0a84ff;
      --active-bg: #0a84ff;
      --hover-bg: rgba(255,255,255,0.06);
      --divider: #38383a;
      --group-label: #636366;
      --tag-bg: rgba(10,132,255,0.18);
      --tag-text: #0a84ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 300px;
      min-width: 300px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--divider) transparent;
    }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-track { background: transparent; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

    .group-label {
      padding: 14px 20px 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--group-label);
      text-transform: uppercase;
      letter-spacing: 0.055em;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .note-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px 9px 16px;
      margin: 1px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .note-item:hover { background: var(--hover-bg); }
    .note-item.active { background: var(--active-bg); }

    .note-emoji {
      font-size: 22px;
      line-height: 1.25;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .note-body { flex: 1; min-width: 0; }

    .note-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .note-meta-line {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 3px;
    }
    .note-date {
      font-size: 11.5px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .note-preview {
      font-size: 11.5px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-folder {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .note-item.active .note-title,
    .note-item.active .note-date,
    .note-item.active .note-preview,
    .note-item.active .note-folder { color: rgba(255,255,255,0.9); }

    .sidebar-footer {
      border-top: 1px solid var(--sidebar-border);
      padding: 10px 20px;
    }
    .dark-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 0;
      transition: color 0.15s;
    }
    .dark-btn:hover { color: var(--text); }

    /* ═══ CONTENT ═══ */
    .content {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      position: relative;
    }

    .content-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      text-align: right;
      padding: 18px 32px 0;
      font-size: 12px;
      color: var(--muted);
      z-index: 10;
    }

    .content-body {
      padding: 32px 56px 80px;
      max-width: 760px;
    }

    /* ═══ NOTE CONTENT STYLES ═══ */
    #note-content h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.15;
    }

    #note-content p {
      font-size: 15px;
      line-height: 1.72;
      color: var(--text-2);
      margin-bottom: 14px;
    }

    #note-content strong { color: var(--text); font-weight: 600; }

    #note-content hr {
      border: none;
      border-top: 1px solid var(--divider);
      margin: 24px 0;
    }

    #note-content ul { list-style: none; margin-bottom: 12px; }
    #note-content ul li {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-2);
      padding-left: 18px;
      position: relative;
      margin-bottom: 7px;
    }
    #note-content ul li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 7.5px;
      top: 5px;
    }

    .job-role {
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .job-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin: 4px 0;
    }
    .stat { padding: 16px 0; }
    .stat-num {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-lbl { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* Tags */
    .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 12.5px;
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Skills */
    .skill-group { margin-bottom: 22px; }
    .skill-group-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Education */
    .edu-entry { margin-bottom: 4px; }
    .edu-inst { font-size: 15px; font-weight: 600; color: var(--text); }
    .edu-deg { font-size: 14px; color: var(--text-2); margin-top: 1px; }
    .edu-year { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Contact */
    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 18px;
    }
    .contact-lbl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      width: 88px;
      flex-shrink: 0;
    }
    .contact-val { font-size: 15px; color: var(--text-2); }
    .contact-val a { color: var(--accent); text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }

    /* Mobile */
    @media (max-width: 680px) {
      .sidebar { position: fixed; left: -100%; transition: left 0.25s; z-index: 100; }
      .sidebar.open { left: 0; }
      .content-body { padding: 24px 24px 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .mob-menu { display: flex; }
    }
    .mob-menu {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-border);
      border-radius: 8px;
      padding: 7px 11px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>

// ═══ GROUPS ═══
const groups = [
  { label: '📌 Pinned', filter: n => n.pinned },
  { label: 'Experience', filter: n => n.group === 'experience' },
  { label: '——', filter: n => n.bottom },
];

// ═══ STATE ═══
let activeId = 'about';
let dark = false;

// ═══ RENDER ═══
function renderSidebar() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  groups.forEach(g => {
    const items = notes.filter(g.filter);
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = g.label;
    list.appendChild(lbl);
    items.forEach(n => list.appendChild(makeItem(n)));
  });
}

function makeItem(note) {
  const el = document.createElement('div');
  el.className = 'note-item' + (note.id === activeId ? ' active' : '');
  el.dataset.id = note.id;
  el.innerHTML = `
    <div class="note-emoji">${note.emoji}</div>
    <div class="note-body">
      <div class="note-title">${note.title}</div>
      <div class="note-meta-line">
        <span class="note-date">${note.date}</span>
        <span class="note-preview">${note.preview}</span>
      </div>
      <div class="note-folder">📁 ${note.folder}</div>
    </div>`;
  el.addEventListener('click', () => selectNote(note.id));
  return el;
}

function selectNote(id) {
  activeId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  document.querySelectorAll('.note-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );
  document.getElementById('note-content').innerHTML = note.render();
  document.getElementById('content-header').textContent = note.header;
  document.querySelector('.content').scrollTop = 0;
  // close mobile sidebar
  document.querySelector('.sidebar').classList.remove('open');
}

function toggleDark() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('dark-icon').textContent = dark ? '☀️' : '🌙';
  document.getElementById('dark-label').textContent = dark ? 'Light' : 'Dark';
}

// ═══ INIT ═══
renderSidebar();
selectNote('about');
</script>
