// ═══ GROUPS ═══
const groups = [
  { label: '📌 Pinned', filter: n => n.pinned },
  { label: 'Cases', filter: n => n.group === 'cases' },
  { label: 'More', filter: n => n.bottom },
];

// ═══ STATE ═══
let activeId = 'about';
let dark = false;

// ═══ RENDER ═══
function renderSidebar() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  groups.forEach(g => {
    const items = notes.filter(g.filter);
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = g.label;
    list.appendChild(lbl);
    items.forEach(n => list.appendChild(makeItem(n)));
  });
}

function makeItem(note) {
  const el = document.createElement('div');
  el.className = 'note-item' + (note.id === activeId ? ' active' : '');
  el.dataset.id = note.id;
  el.innerHTML = `
    <div class="note-emoji">${note.emoji}</div>
    <div class="note-body">
      <div class="note-title">${note.title}</div>
      <div class="note-meta-line">
        <span class="note-date">${note.date}</span>
        <span class="note-preview">${note.preview}</span>
      </div>
      <div class="note-folder">📁 ${note.folder}</div>
    </div>`;
  el.addEventListener('click', () => selectNote(note.id));
  return el;
}

function selectNote(id) {
  activeId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  document.querySelectorAll('.note-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );
  document.getElementById('note-content').innerHTML = note.render();
  document.getElementById('content-header').textContent = note.header;
  document.querySelector('.content').scrollTop = 0;
  // close mobile sidebar
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function toggleDark() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('dark-icon').textContent = dark ? '☀️' : '🌙';
  document.getElementById('dark-label').textContent = dark ? 'Light' : 'Dark';
}

async function getSummary() {
  const btn = document.getElementById('summary-btn');
  const modal = document.getElementById('modal-overlay');
  const text = document.getElementById('modal-text');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  modal.classList.add('open');
  text.textContent = 'Generating…';
  try {
    const res = await fetch('https://cv-summary.tina-vislianska.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    const data = await res.json();
    text.textContent = data.summary;
  } catch {
    text.textContent = 'Something went wrong. Try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ Quick Summary';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ═══ INIT ═══
renderSidebar();
selectNote('about');
</script>
